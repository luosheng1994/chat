<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仿微信聊天</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">微信 · Chat</div>
        <div class="profile-bar card">
            <select id="currentUser"></select>
            <button id="renameBtn" class="ghost-btn">改昵称</button>
        </div>
        <div class="contact-head card">
            <h3>好友</h3>
            <button id="newGroupBtn" class="primary-btn">+ 发起群聊</button>
        </div>
        <ul id="friendList" class="list"></ul>
        <h3>群聊</h3>
        <ul id="groupList" class="list"></ul>
    </aside>
    <main class="chat-panel">
        <header id="chatTitle">请选择会话</header>
        <section id="msgArea" class="messages"></section>
        <footer class="composer">
            <div class="tools">
                <button id="emojiBtn">😊</button>
                <button id="plusBtn">＋</button>
                <input id="fileInput" type="file" hidden />
                <div id="emojiPanel" class="popup hidden">😀 😄 😆 😂 😍 👍 🎉 ❤️</div>
                <div id="plusPanel" class="popup hidden">
                    <button data-action="file">选择文件</button>
                    <button data-action="voicecall">发起语音聊天</button>
                    <button data-action="videocall">发起视频聊天</button>
                </div>
            </div>
            <textarea id="input" placeholder="输入消息"></textarea>
            <button id="voiceBtn">按住录音</button>
            <button id="sendBtn">发送</button>
        </footer>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
